<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>員工簽到系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 400px; text-align: center; }
    .status-box { margin: 20px 0; padding: 15px; border-radius: 10px; background: #e9ecef; font-size: 14px; color: #495057; }
    #userId { color: #00b900; font-weight: bold; word-break: break-all; margin-top: 10px; }
    .btn { background: #00b900; color: white; border: none; padding: 15px 0; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; transition: 0.3s; }
    .btn:active { background: #008f00; transform: scale(0.98); }
  </style>
</head>
<body>

<div class="container">
  <h2>🧹 清潔員簽到</h2>
  <div class="status-box" id="status">正在啟動 LINE 驗證...</div>
  <div id="userId"></div>
  
  <button id="sendBtn" class="btn" onclick="submitToSheet()">確認簽到</button>
</div>

<script>
  // ⚠️ 重要：請把你的 GAS 網址貼在下方引號內
  const GAS_WEB_APP_URL = "在此貼上你的GAS網頁應用程式網址";

  let userProfile = null;

  async function main() {
    const status = document.getElementById('status');
    try {
      // 1. 初始化 LIFF
      await liff.init({ liffId: "2009587017-nnCisgdy" });
      
      // 2. 判斷登入狀態
      if (!liff.isLoggedIn()) {
        status.innerText = "正在導向登入畫面...";
        liff.login();
      } else {
        // 3. 取得個人資料
        userProfile = await liff.getProfile();
        status.innerText = "驗證成功！請點擊下方按鈕完成簽到。";
        document.getElementById('userId').innerText = "您的 ID: " + userProfile.userId;
        document.getElementById('sendBtn').style.display = "block";
      }
    } catch (err) {
      status.innerText = "❌ 錯誤: " + err.message;
      console.error(err);
    }
  }

  async function submitToSheet() {
    const status = document.getElementById('status');
    const btn = document.getElementById('sendBtn');
    
    status.innerText = "🚀 正在傳送至試算表...";
    btn.disabled = true;
    btn.style.opacity = "0.5";

    try {
      // 使用 fetch 發送資料到 GAS (POST 方式)
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors', // 避開 GAS 的 CORS 限制
        cache: 'no-cache',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId: userProfile.userId,
          displayName: userProfile.displayName
        })
      });

      // 由於 no-cors 模式無法讀取 response，我們直接提示成功
      alert("簽到成功！請關閉視窗。");
      status.innerText = "✅ 簽到已完成";
      liff.closeWindow(); // 自動關閉 LINE 視窗
    } catch (error) {
      alert("傳送失敗，請聯繫管理員");
      status.innerText = "❌ 傳送失敗";
      btn.disabled = false;
      btn.style.opacity = "1";
    }
  }

  main();
</script>

</body>
</html>
